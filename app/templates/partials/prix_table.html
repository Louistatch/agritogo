{% if data %}
<h3>Prix de {{ produit }}</h3>
<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Marché</th>
            <th>Prix (FCFA/kg)</th>
        </tr>
    </thead>
    <tbody>
        {% for row in data %}
        <tr>
            <td>{{ row.date }}</td>
            <td>{{ row.marche }}</td>
            <td class="prix">{{ "%.0f"|format(row.prix) }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="empty">Aucune donnée trouvée pour ce produit.</p>
{% endif %}
