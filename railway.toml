[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gunicorn --bind 0.0.0.0:8080 --workers 2 --worker-class sync --timeout 120 --graceful-timeout 30 --log-level info --access-logfile - --error-logfile - app.server:app"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
